services:
  factaudit-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: factaudit-app
    container_name: factaudit-server
    ports:
      - "8000:8000"
    volumes:
      - ./datas/factaudit/:/root/.local/share/factaudit/
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/projects', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 3s
    restart: unless-stopped
    command: ["uv", "run", "factaudit", "serve", "--host", "0.0.0.0", "--no-access-log"]
  factaudit-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
    image: factaudit-app
    container_name: factaudit-dispatcher
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dispatch.yaml:/factaudit/dispatch.yaml
    depends_on:
      factaudit-server:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "factaudit", "dispatch", "--config", "dispatch.yaml"]
